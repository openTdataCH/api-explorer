<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>API Docs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet"
        href="https://unpkg.com/swagger-ui-dist/swagger-ui.css">
  <style>html,body,#swagger{height:100%;margin:0}</style>
</head>
<body>
  <div id="swagger"></div>
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4/dist/js-yaml.min.js"></script>
  <script src="https://unpkg.com/swagger-ui-dist/swagger-ui-bundle.js"></script>
  <script src="https://unpkg.com/swagger-ui-dist/swagger-ui-standalone-preset.js"></script>
  <script>
    const PRESET_BEARER = "${API_KEY}";

    const ui = SwaggerUIBundle({
      url: './openapi.yaml',
      dom_id: '#swagger',
      deepLinking: true,
      presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset],
      layout: 'StandaloneLayout',
      tryItOutEnabled: true,
      requestInterceptor: req => {
        req.headers.Authorization = 'Bearer ' + PRESET_BEARER;
        return req;
      },
      onComplete: () => {
        ui.preauthorizeApiKey("bearerAuth", PRESET_BEARER);
      },
    });

    window.ui = ui;
    function todayYMD(tz = 'Europe/Zurich') {
      const p = new Intl.DateTimeFormat('en-CA', {
        timeZone: tz, year: 'numeric', month: '2-digit', day: '2-digit'
      }).formatToParts(new Date()).reduce((a, x) => (a[x.type] = x.value, a), {});
      return `${p.year}-${p.month}-${p.day}`; // YYYY-MM-DD
    }

    // UTC datetime with milliseconds and trailing Z
    function nowZulu() {
      const d = new Date();
      const y = d.getUTCFullYear();
      const m = String(d.getUTCMonth() + 1).padStart(2, '0');
      const day = String(d.getUTCDate()).padStart(2, '0');
      const hh = String(d.getUTCHours()).padStart(2, '0');
      const mm = String(d.getUTCMinutes()).padStart(2, '0');
      const ss = String(d.getUTCSeconds()).padStart(2, '0');
      const ms = String(d.getUTCMilliseconds()).padStart(3, '0');
      return `${y}-${m}-${day}T${hh}:${mm}:${ss}.${ms}Z`;
    }
  </script>
</body>
</html>
